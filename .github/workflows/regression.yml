name: Regression

on:
  push:
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run ingestion policy validation
        run: make validate-policy
      - name: Run regression suite
        run: make regression
